server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logs (JSON)
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_label_service"]
        target_label: service
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            message: message
            correlation_id: correlation_id
      - labels:
          level:
          service:

  # Rails log files (development)
  - job_name: rails
    static_configs:
      - targets: [localhost]
        labels:
          service: devteam-hub
          environment: development
          __path__: /var/log/devteam/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
      - labels:
          level:

  # Jenkins logs
  - job_name: jenkins
    static_configs:
      - targets: [localhost]
        labels:
          service: jenkins
          __path__: /var/log/jenkins/*.log
    pipeline_stages:
      - regex:
          expression: '^\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}\.\d+ \[(?P<level>\w+)\]'
      - labels:
          level:
