# sonar-project.properties — DevTeam Hub
sonar.projectKey=dev-team-hub
sonar.projectName=DevTeam Hub
sonar.projectVersion=1.0

sonar.sources=app,lib,config
sonar.tests=spec,features
sonar.exclusions=vendor/**,node_modules/**,tmp/**,log/**,public/**,storage/**,db/*.sqlite3*

sonar.ruby.coverage.reportPaths=coverage/.resultset.json
sonar.ruby.rubocop.reportPaths=rubocop-report.json

sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.qualitygate.wait=true
